"$schema" = 'https://starship.rs/config-schema.json'

format = """
$status\
$cmd_duration\
$directory\
$character"""

# в”Җв”Җ OS icon в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
format = '[оӮ° $symbol ]($style)'
style   = "bold prev_fg inverted"
disabled = false

# в”Җв”Җ Execution time в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
format            = "[оӮ° $duration ]($style)"
style             = "bold prev_fg"
min_time          = 0       # show always
show_milliseconds = true

# в”Җв”Җ Exit status в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[status]
format            = '[оӮ° $symbol ]($style)'
success_style   = "bold blue inverted"
failure_style   = "bold red inverted"
success_symbol    = "пҖҢ"
not_found_symbol  = "пҖҚ"
symbol            = "пҖҚ"
disabled          = false

# в”Җв”Җ Directory (second line, agnoster-short max 3 dirs) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
format = '[оӮ° $path ]($style)'
style   = "bold prev_fg inverted"
disabled = false
truncate_to_repo = false
truncation_length = 0

# в”Җв”Җ Prompt character (third line) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
format          = "[$symbol]($style) "
success_symbol  = "[оӮ°](bold prev_fg)"
error_symbol    = "[оӮ°](bold prev_fg)"

